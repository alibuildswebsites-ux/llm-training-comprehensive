# Export Format → Conversion Commands & Compatibility
# Used by export pipeline scripts (merge_lora.py, convert_to_*.py)

gguf:
  description: "GGUF format for llama.cpp, Ollama, LM Studio"
  tool: "llama.cpp"
  install: "git clone https://github.com/ggerganov/llama.cpp && cd llama.cpp && make"
  quants:
    Q4_K_M:
      description: "4-bit K-quant medium, best balance of quality/size"
      command: "llama-quantize model-f16.gguf model-Q4_K_M.gguf Q4_K_M"
      size_factor: 0.28  # ~28% of fp16 size
      quality: "excellent"
      recommended: true
    Q5_K_M:
      description: "5-bit K-quant medium, slightly better quality"
      command: "llama-quantize model-f16.gguf model-Q5_K_M.gguf Q5_K_M"
      size_factor: 0.33
      quality: "excellent+"
    Q8_0:
      description: "8-bit, near-lossless quality"
      command: "llama-quantize model-f16.gguf model-Q8_0.gguf Q8_0"
      size_factor: 0.50
      quality: "near-lossless"
    Q3_K_M:
      description: "3-bit K-quant medium, smaller but quality drop"
      command: "llama-quantize model-f16.gguf model-Q3_K_M.gguf Q3_K_M"
      size_factor: 0.22
      quality: "good"
    Q2_K:
      description: "2-bit K-quant, very small, significant quality loss"
      command: "llama-quantize model-f16.gguf model-Q2_K.gguf Q2_K"
      size_factor: 0.18
      quality: "acceptable"
    F16:
      description: "Full 16-bit, no quantization"
      command: "llama-quantize model-f16.gguf model-F16.gguf F16"
      size_factor: 1.0
      quality: "lossless"
    F32:
      description: "Full 32-bit"
      command: "llama-quantize model-f16.gguf model-F32.gguf F32"
      size_factor: 2.0
      quality: "lossless"
  conversion_steps:
    - "Merge LoRA adapters into base model (merge_lora.py)"
    - "Convert HF to GGUF F16 (convert_hf_to_gguf.py)"
    - "Quantize to desired level (llama-quantize)"
  deployment:
    ollama: true
    lm_studio: true
    llama_cpp: true
    vllm: false
    tgi: false
  architecture_support:
    llama: true
    qwen: true
    mistral: true
    gemma: true
    phi: true
    deepseek: true
    yi: true
    baichuan: true
    internlm: true
    stablelm: true

awq:
  description: "AWQ (Activation-aware Weight Quantization) for fast inference"
  tool: "autoawq"
  install: "pip install autoawq"
  quants:
    w4-g128:
      description: "4-bit, group size 128 (default)"
      command: "python -m awq.entry --model_path merged_model --w_bit 4 --q_group_size 128 --calib_data wikitext --output_path awq_model"
      size_factor: 0.28
      quality: "excellent"
      recommended: true
    w4-g64:
      description: "4-bit, group size 64 (better quality, larger)"
      command: "python -m awq.entry --model_path merged_model --w_bit 4 --q_group_size 64 --calib_data wikitext --output_path awq_model"
      size_factor: 0.30
      quality: "excellent+"
    w3-g128:
      description: "3-bit, group size 128"
      command: "python -m awq.entry --model_path merged_model --w_bit 3 --q_group_size 128 --calib_data wikitext --output_path awq_model"
      size_factor: 0.22
      quality: "good"
  conversion_steps:
    - "Merge LoRA adapters into base model (merge_lora.py)"
    - "Run AWQ quantization with calibration data"
  deployment:
    ollama: false
    lm_studio: false
    vllm: true
    tgi: true
    llama_cpp: false
  requirements:
    - "Requires calibration dataset (wikitext or similar)"
    - "Only supports linear layers (no embedding quantization)"

gptq:
  description: "GPTQ (Accurate Post-Training Quantization) for fast inference"
  tool: "auto-gptq"
  install: "pip install auto-gptq"
  quants:
    w4-g128:
      description: "4-bit, group size 128"
      command: "python -m auto_gptq.modeling.eval --model merged_model --quantize --bits 4 --group-size 128 --output gptq_model"
      size_factor: 0.28
      quality: "excellent"
      recommended: true
    w4-g64:
      description: "4-bit, group size 64"
      command: "python -m auto_gptq.modeling.eval --model merged_model --quantize --bits 4 --group-size 64 --output gptq_model"
      size_factor: 0.30
      quality: "excellent+"
    w3-g128:
      description: "3-bit, group size 128"
      command: "python -m auto_gptq.modeling.eval --model merged_model --quantize --bits 3 --group-size 128 --output gptq_model"
      size_factor: 0.22
      quality: "good"
  conversion_steps:
    - "Merge LoRA adapters into base model (merge_lora.py)"
    - "Run GPTQ quantization with calibration data"
  deployment:
    ollama: false
    lm_studio: false
    vllm: true
    tgi: true
    llama_cpp: false
  requirements:
    - "Requires calibration dataset"
    - "Slower quantization than AWQ"

exl2:
  description: "EXL2 format for ExLlamaV2 inference engine"
  tool: "exllama-v2"
  install: "pip install exllamav2"
  quants:
    4.0bpw:
      description: "4 bits per weight"
      command: "python -m exllamav2.convert -i merged_model -o exl2_model -b 4.0"
      size_factor: 0.25
      quality: "excellent"
      recommended: true
    3.0bpw:
      description: "3 bits per weight"
      command: "python -m exllamav2.convert -i merged_model -o exl2_model -b 3.0"
      size_factor: 0.19
      quality: "good"
    5.0bpw:
      description: "5 bits per weight"
      command: "python -m exllamav2.convert -i merged_model -o exl2_model -b 5.0"
      size_factor: 0.31
      quality: "excellent+"
  conversion_steps:
    - "Merge LoRA adapters"
    - "Convert with exllamav2.convert"
  deployment:
    ollama: false
    lm_studio: false
    vllm: false
    tgi: false
    llama_cpp: false
    exllamav2: true

hf-safetensors:
  description: "HuggingFace native format (safetensors)"
  tool: "transformers"
  install: "pip install transformers accelerate safetensors"
  quants:
    none:
      description: "Full precision (fp16/bf16)"
      command: "model.save_pretrained('output', safe_serialization=True)"
      size_factor: 1.0
      quality: "lossless"
      recommended: true
    bf16:
      description: "bfloat16 precision"
      command: "model.save_pretrained('output', safe_serialization=True, torch_dtype=torch.bfloat16)"
      size_factor: 0.5
      quality: "lossless"
  conversion_steps:
    - "Merge LoRA adapters (merge_lora.py)"
    - "Save with safe_serialization=True"
  deployment:
    ollama: true
    lm_studio: true
    vllm: true
    tgi: true
    llama_cpp: false

onnx:
  description: "ONNX format for cross-platform inference"
  tool: "optimum"
  install: "pip install optimum[onnxruntime]"
  quants:
    fp16:
      description: "FP16 ONNX"
      command: "optimum-cli export onnx --model merged_model --task text-generation --dtype fp16 onnx_model"
      size_factor: 0.5
      quality: "lossless"
    int8:
      description: "INT8 quantized ONNX"
      command: "optimum-cli export onnx --model merged_model --task text-generation --dtype int8 onnx_model"
      size_factor: 0.25
      quality: "good"
  conversion_steps:
    - "Merge LoRA adapters"
    - "Export with optimum-cli"
  deployment:
    onnx_runtime: true
    openvino: true
    tensorrt: true

tensorrt-llm:
  description: "TensorRT-LLM for maximum inference performance on NVIDIA GPUs"
  tool: "tensorrt-llm"
  install: "pip install tensorrt-llm (from NVIDIA container)"
  quants:
    fp16:
      description: "FP16 TensorRT engine"
      command: "trtllm-build --checkpoint_dir merged_model --output_dir trt_engine --dtype float16"
      size_factor: 0.5
      quality: "lossless"
    int8:
      description: "INT8 quantized engine"
      command: "trtllm-build --checkpoint_dir merged_model --output_dir trt_engine --dtype int8 --calib_data calib_data.json"
      size_factor: 0.25
      quality: "excellent"
    int4:
      description: "INT4 quantized engine"
      command: "trtllm-build --checkpoint_dir merged_model --output_dir trt_engine --dtype int4 --calib_data calib_data.json"
      size_factor: 0.15
      quality: "good"
  conversion_steps:
    - "Merge LoRA adapters"
    - "Build TensorRT engine"
  deployment:
    tensorrt_llm: true
    triton: true

deployment_compatibility:
  # Format → Deployment targets
  GGUF: ["Ollama", "LM Studio", "llama.cpp", "text-generation-webui", "KoboldCPP"]
  AWQ: ["vLLM", "TGI", "FastChat"]
  GPTQ: ["vLLM", "TGI", "FastChat", "AutoGPTQ"]
  EXL2: ["ExLlamaV2", "text-generation-webui"]
  HF_SAFETENSORS: ["vLLM", "TGI", "FastChat", "Ollama", "LM Studio", "Transformers"]
  ONNX: ["ONNX Runtime", "OpenVINO", "TensorRT"]
  TENSORRT_LLM: ["TensorRT-LLM", "Triton Inference Server"]