# TorchTune SFT LoRA Config
# Run with: tune run lora_finetune_single_device --config templates/torchtune/sft_lora.yaml

model:
  _component_: torchtune.models.llama3_1.llama3_1_8b
  tokenizer:
    _component_: torchtune.models.llama3.llama3_tokenizer
    path: meta-llama/Llama-3.1-8B-Instruct

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: meta-llama/Llama-3.1-8B-Instruct
  output_dir: outputs/torchtune-sft-lora
  model_type: LLAMA3

peft:
  _component_: torchtune.training.peft.LoRA
  lora_attn_modules: ["q_proj", "k_proj", "v_proj", "output_proj"]
  apply_lora_to_mlp: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # init_lora_weights: "loftq"  # For LoRA-GA initialization

dataset:
  _component_: torchtune.datasets.AlpacaDataset
  source: data/train.jsonl
  train_on_input: false
  split: train

dataloader:
  _component_: torchtune.data.Dataloader
  batch_size: 2
  shuffle: true
  num_workers: 2

optimizer:
  _component_: torch.optim.AdamW
  lr: 2e-4
  weight_decay: 0.01
  eps: 1e-8

lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 100

training:
  epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 4
  compile: true
  gradient_clipping: 1.0
  mixed_precision: bf16

log_every_n_steps: 10
save_every_n_steps: 500