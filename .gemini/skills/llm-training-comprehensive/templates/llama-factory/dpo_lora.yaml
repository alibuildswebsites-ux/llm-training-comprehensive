### model
model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
### method
finetuning_type: lora
### dataset
dataset_dir: data
dataset: my_dpo_data
template: llama3
cutoff_len: 1024
max_samples: 10000
### output
output_dir: outputs/llama-factory-dpo-lora
logging_steps: 10
save_steps: 500
### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-7
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
### lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
### dpo
pref_beta: 0.1
pref_loss: sigmoid
### optimizer
optim: adamw_bnb_8bit
### others
report_to: wandb
run_name: llama-factory-llama31-8b-dpo-lora
flash_attn: true
gradient_checkpointing: true