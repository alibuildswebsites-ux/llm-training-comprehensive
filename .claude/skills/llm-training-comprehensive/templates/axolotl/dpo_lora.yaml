# Axolotl DPO LoRA Config
# Run with: axolotl train templates/axolotl/dpo_lora.yaml

base_model: meta-llama/Llama-3.1-8B-Instruct
model_type: LoraForCausalLM

model_config:
  load_in_4bit: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

tokenizer_config:
  trust_remote_code: false

datasets:
  - path: data/dpo_train.jsonl
    type: dpo
    field_prompt: prompt
    field_chosen: chosen
    field_rejected: rejected

sequence_len: 1024
pad_to_sequence_len: true

micro_batch_size: 2
gradient_accumulation_steps: 4
num_epochs: 1
learning_rate: 5e-7
lr_scheduler: cosine
warmup_ratio: 0.03
optimizer: adamw_bnb_8bit
bf16: auto
tf32: true

beta: 0.1
max_length: 1024
max_prompt_length: 512
loss_type: sigmoid

logging_steps: 10
save_steps: 500
output_dir: outputs/axolotl-dpo-lora

flash_attention: true
gradient_checkpointing: true

wandb_project: llm-finetune
wandb_name: axolotl-llama31-8b-dpo-lora