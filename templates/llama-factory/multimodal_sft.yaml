# LLaMA-Factory Multimodal SFT Configuration
# Run: llamafactory-cli train templates/llama-factory/multimodal_sft.yaml

model_name_or_path: "Qwen/Qwen2-VL-7B-Instruct"
template: "qwen2_vl"
finetuning_type: "lora"
lora_target: "q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj"
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

dataset: "llava_instruct_150k"
dataset_dir: "data"
cutoff_len: 8192
max_samples: 10000
preprocessing_num_workers: 16

output_dir: "llama_factory_multimodal_output"
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
bf16: true
tf32: true

optim: "adamw_bnb_8bit"
weight_decay: 0.01
max_grad_norm: 1.0

dataloader_num_workers: 4
dataloader_pin_memory: true
group_by_length: true

report_to: "wandb"
run_name: "llama-factory-multimodal-sft"

ddp_timeout: 180000000
gradient_checkpointing: true
use_flash_attn: true

freeze_vision_tower: true
freeze_multi_modal_projector: true